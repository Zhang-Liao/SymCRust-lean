# Aeneas extraction configuration for the verilib atomization pipeline.
#
# The hosted pipeline runs `probe-aeneas extract .` from the repo root, reads
# this file, treats the repo root as the Lean/Lake project (made valid by the
# root `lakefile.lean`, which sets `srcDir := "lean"`), and locates the Rust
# crate via `crate.dir`.
#
# The charon / aeneas settings mirror `Makefile`'s `extract` target so the
# atomization scope matches the committed `lean/Symcrust/Code/` sources
# (intrinsics + SHA-3 + ML-KEM).

aeneas:
  # Pinned to match lean/lean-toolchain (leanprover/lean4:v4.31.0); also the
  # commit lean/lakefile.lean requires the aeneas Lean backend from.
  commit: "b059c34a"
  repo: "https://github.com/AeneasVerif/aeneas.git"

crate:
  dir: "."         # Rust crate root (Cargo.toml lives here)
  name: "symcrust" # cargo package name

charon:
  preset: "aeneas"
  cargo_args: ["--features", "verify"]
  # Seed charon from the in-scope module roots (see Makefile `extract` for the
  # rationale on why these are named explicitly rather than closed over).
  start_from:
    - "crate::sha3"
    - "crate::mlkem"
    - "crate::verify"
    - "crate::common"
    - "crate::sha3::sha3_impl::keccak_permute_textbook"
    - "crate::sha3::keccak_opt::keccak_permute_opt"

aeneas_args:
  options:
    - loops-to-rec
    - split-files
  dest: "lean"            # Lean/Lake project (generated sources under lean/Symcrust/Code)
  subdir: "Symcrust/Code"
